<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محول العملات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:25px;
border-radius:20px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
margin-bottom:20px;
color:#333;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
transition:0.3s;
}

input:focus,select:focus{
border-color:#667eea;
outline:none;
box-shadow:0 0 5px rgba(102,126,234,0.5);
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5a67d8;
transform:scale(1.02);
}

.swap{
font-size:24px;
margin:10px;
cursor:pointer;
color:#667eea;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
color:#222;
}

.settings{
position:fixed;
bottom:20px;
left:20px;
background:white;
border-radius:50%;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>💱 محول العملات</h1>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 تركي</option>
<option value="SYP">🇸🇾 سوري</option>
</select>

<div class="swap" onclick="swap()">⇅</div>

<select id="to">
<option value="SYP">🇸🇾 سوري</option>
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 تركي</option>
</select>

<button onclick="convert()">تحويل</button>

<div id="result" class="result"></div>

</div>

<div class="settings" onclick="openAdmin()">⚙️</div>

<script>

// الأسعار
let rates = JSON.parse(localStorage.getItem("rates")) || {
USD_SYP:12450,
USD_TRY:43,
TRY_SYP:290
}

// التحويل
function convert(){

let amount=parseFloat(document.getElementById("amount").value)
let from=document.getElementById("from").value
let to=document.getElementById("to").value

if(!amount){
alert("أدخل المبلغ")
return
}

let result=0

if(from==="USD" && to==="SYP") result=amount*rates.USD_SYP
else if(from==="SYP" && to==="USD") result=amount/rates.USD_SYP
else if(from==="USD" && to==="TRY") result=amount*rates.USD_TRY
else if(from==="TRY" && to==="USD") result=amount/rates.USD_TRY
else if(from==="TRY" && to==="SYP") result=amount*rates.TRY_SYP
else if(from==="SYP" && to==="TRY") result=amount/rates.TRY_SYP

document.getElementById("result").innerText =
amount+" "+from+" = "+result.toFixed(2)+" "+to

}

// تبديل العملات
function swap(){
let from=document.getElementById("from")
let to=document.getElementById("to")
let temp=from.value
from.value=to.value
to.value=temp
}

// لوحة التحكم
function openAdmin(){

let pass = prompt("كلمة المرور")

if(!pass || pass.trim() !== "1234"){
alert("خطأ")
return
}

let newRate = prompt("سعر الدولار مقابل السوري", rates.USD_SYP)

if(newRate){
rates.USD_SYP = parseFloat(newRate)
localStorage.setItem("rates", JSON.stringify(rates))
alert("تم التحديث ✅")
}

}

</script>

</body>
</html>
