<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محول العملات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.container{
background:white;
padding:25px;
border-radius:20px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
position:relative;
}

h1{
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:#4f46e5;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

.swap{
font-size:22px;
margin:10px;
cursor:pointer;
}

/* زر الوضع الليلي */
.dark-toggle{
position:absolute;
top:10px;
left:10px;
background:#eee;
padding:6px 10px;
border-radius:10px;
cursor:pointer;
}

/* الوضع الليلي */
.dark{
background:#0f172a;
}

.dark .container{
background:#1e293b;
color:white;
}

.dark input,
.dark select{
background:#334155;
color:white;
border:1px solid #555;
}

.dark button{
background:#6366f1;
}

.dark .result{
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="dark-toggle" onclick="toggleDark()">🌙</div>

<h1>💱 محول العملات</h1>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 تركي</option>
<option value="SYP">🇸🇾 سوري</option>
</select>

<div class="swap" onclick="swap()">⇅</div>

<select id="to">
<option value="SYP">🇸🇾 سوري</option>
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 تركي</option>
</select>

<button onclick="convert()">تحويل</button>

<div id="result" class="result"></div>

</div>

<script>

// 🔥 أسعار ثابتة للجميع
let rates = {
USD_SYP:11870
USD_TRY:44
TRY_SYP:266
}

// التحويل
function convert(){

let amount = parseFloat(document.getElementById("amount").value)
let from = document.getElementById("from").value
let to = document.getElementById("to").value

if(!amount){
alert("أدخل المبلغ")
return
}

let result = 0

if(from==="USD" && to==="SYP") result = amount * rates.USD_SYP
else if(from==="SYP" && to==="USD") result = amount / rates.USD_SYP
else if(from==="USD" && to==="TRY") result = amount * rates.USD_TRY
else if(from==="TRY" && to==="USD") result = amount / rates.USD_TRY
else if(from==="TRY" && to==="SYP") result = amount * rates.TRY_SYP
else if(from==="SYP" && to==="TRY") result = amount / rates.TRY_SYP

document.getElementById("result").innerText =
amount + " " + from + " = " + result.toFixed(2) + " " + to

}

// تبديل العملات
function swap(){
let from = document.getElementById("from")
let to = document.getElementById("to")

let temp = from.value
from.value = to.value
to.value = temp
}

// الوضع الليلي
function toggleDark(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
localStorage.setItem("darkMode","on")
}else{
localStorage.setItem("darkMode","off")
}

}

// حفظ الوضع
window.onload = function(){
if(localStorage.getItem("darkMode")==="on"){
document.body.classList.add("dark")
}
}

</script>

</body>
</html>
