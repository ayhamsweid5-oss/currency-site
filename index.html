<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محول العملات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Cairo',sans-serif;
background:#eceff1;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:16px;
width:380px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
text-align:center;
}

h1{
margin-bottom:20px;
color:#2c3e50;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#1976d2;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

.swap{
font-size:22px;
margin:10px;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

.flags{
font-size:26px;
margin-bottom:10px;
}

.ad{
margin-top:15px;
background:#f1f1f1;
padding:10px;
border-radius:8px;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h1>💱 محول العملات</h1>

<div class="flags">
🇺🇸 🇹🇷 🇸🇾
</div>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 ليرة تركية</option>
<option value="SYP">🇸🇾 ليرة سورية</option>
</select>

<div class="swap" onclick="swap()">⇅</div>

<select id="to">
<option value="SYP">🇸🇾 ليرة سورية</option>
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 ليرة تركية</option>
</select>

<button onclick="convert()">تحويل</button>

<div id="result" class="result"></div>

<canvas id="chart" height="120"></canvas>

<div class="ad">
مكان الإعلان (AdMob أو شبكة إعلانات)
</div>

</div>

<script>

const USD_SYP = 11800
const USD_TRY = 43 
const TRY_SYP = 270 

function convert(){

let amount=parseFloat(document.getElementById("amount").value)
let from=document.getElementById("from").value
let to=document.getElementById("to").value

if(!amount){
alert("أدخل المبلغ")
return
}

const USD_SYP = 11800
const USD_TRY = 43

if(from==="USD" && to==="SYP") result=amount*USD_SYP
else if(from==="SYP" && to==="USD") result=amount/USD_SYP
else if(from==="USD" && to==="TRY") result=amount*USD_TRY
else if(from==="TRY" && to==="USD") result=amount/USD_TRY
else if(from==="TRY" && to==="SYP") result=amount*TRY_SYP
else if(from==="SYP" && to==="TRY") result=amount/TRY_SYP
else result=amount

document.getElementById("result").innerText=
amount+" "+from+" = "+result.toFixed(2)+" "+to

localStorage.setItem("lastRate", result)

drawChart(result)

}

function swap(){

let from=document.getElementById("from")
let to=document.getElementById("to")

let temp=from.value
from.value=to.value
to.value=temp

}

function drawChart(value){

let ctx=document.getElementById("chart")

new Chart(ctx,{
type:"line",
data:{
labels:["قبل","الآن","بعد قليل"],
datasets:[{
label:"سعر الصرف",
data:[value*0.95,value,value*1.05],
borderColor:"#1976d2",
fill:false
}]
}
})

}

window.onload=function(){

let last=localStorage.getItem("lastRate")

if(last){
document.getElementById("result").innerText=
"آخر تحويل: "+last
}

}

</script>

</body>
</html>
