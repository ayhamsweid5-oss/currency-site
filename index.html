<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محول العملات</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eceff1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:15px;
width:350px;
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin:5px;
}

.result{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h2>💱 محول العملات</h2>

<input id="amount" placeholder="المبلغ">

<select id="from">
<option value="USD">دولار</option>
<option value="TRY">تركي</option>
<option value="SYP">سوري</option>
</select>

<select id="to">
<option value="SYP">سوري</option>
<option value="USD">دولار</option>
<option value="TRY">تركي</option>
</select>

<button onclick="convert()">تحويل</button>

<div id="result" class="result"></div>

</div>

<!-- زر الإدارة -->
<button onclick="openAdmin()" style="position:fixed;bottom:10px;left:10px;">
⚙️
</button>

<!-- لوحة التحكم -->
<div id="adminPanel" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
padding:20px;
">

<h2>لوحة التحكم</h2>

<p>التحويلات: <span id="conversions"></span></p>

<input id="usd_syp" placeholder="USD→SYP">
<input id="usd_try" placeholder="USD→TRY">
<input id="try_syp" placeholder="TRY→SYP">

<button onclick="saveRates()">حفظ</button>

<button onclick="closeAdmin()">إغلاق</button>

</div>

<script>

// الأسعار
let rates = JSON.parse(localStorage.getItem("rates")) || {
USD_SYP:12450,
USD_TRY:43,
TRY_SYP:290
}

// التحويل
function convert(){

let amount=parseFloat(document.getElementById("amount").value)
let from=document.getElementById("from").value
let to=document.getElementById("to").value

if(!amount){
alert("أدخل المبلغ")
return
}

let result=0

if(from==="USD" && to==="SYP") result=amount*rates.USD_SYP
else if(from==="SYP" && to==="USD") result=amount/rates.USD_SYP
else if(from==="USD" && to==="TRY") result=amount*rates.USD_TRY
else if(from==="TRY" && to==="USD") result=amount/rates.USD_TRY
else if(from==="TRY" && to==="SYP") result=amount*rates.TRY_SYP
else if(from==="SYP" && to==="TRY") result=amount/rates.TRY_SYP

document.getElementById("result").innerText =
amount+" "+from+" = "+result.toFixed(2)+" "+to

// عداد التحويلات
let count = localStorage.getItem("conversions") || 0
count++
localStorage.setItem("conversions", count)

}

// فتح لوحة التحكم (معدل)
function openAdmin(){

let pass = prompt("كلمة المرور")

if(!pass || pass.trim() !== "1234"){
alert("خطأ")
return
}

// تعبئة البيانات
document.getElementById("conversions").innerText =
localStorage.getItem("conversions") || 0

document.getElementById("usd_syp").value = rates.USD_SYP
document.getElementById("usd_try").value = rates.USD_TRY
document.getElementById("try_syp").value = rates.TRY_SYP

// إظهار اللوحة (المهم)
document.getElementById("adminPanel").style.display = "block"

}

// إغلاق اللوحة
function closeAdmin(){
document.getElementById("adminPanel").style.display = "none"
}

// حفظ الأسعار
function saveRates(){

rates = {
USD_SYP:parseFloat(document.getElementById("usd_syp").value),
USD_TRY:parseFloat(document.getElementById("usd_try").value),
TRY_SYP:parseFloat(document.getElementById("try_syp").value)
}

localStorage.setItem("rates", JSON.stringify(rates))

alert("تم الحفظ ✅")

}

</script>

</body>
</html>
