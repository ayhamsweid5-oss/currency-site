<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محول العملات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.swap{
margin:10px;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>💱 محول العملات</h2>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 تركي</option>
<option value="SYP">🇸🇾 سوري</option>
</select>

<div class="swap" onclick="swap()">⇅</div>

<select id="to">
<option value="SYP">🇸🇾 سوري</option>
<option value="USD">🇺🇸 دولار</option>
<option value="TRY">🇹🇷 تركي</option>
</select>

<button onclick="convert()">تحويل</button>

<div id="result" class="result"></div>

</div>

<script>

// 🔥 أسعار ثابتة
const USD_SYP = 11710
const USD_TRY = 44
const TRY_SYP = 266

function convert(){

let amount = parseFloat(document.getElementById("amount").value)
let from = document.getElementById("from").value
let to = document.getElementById("to").value

if(!amount){
alert("أدخل المبلغ")
return
}

let result = 0

if(from === to){
result = amount
}
else if(from==="USD" && to==="SYP") result = amount * USD_SYP
else if(from==="SYP" && to==="USD") result = amount / USD_SYP
else if(from==="USD" && to==="TRY") result = amount * USD_TRY
else if(from==="TRY" && to==="USD") result = amount / USD_TRY
else if(from==="TRY" && to==="SYP") result = amount * TRY_SYP
else if(from==="SYP" && to==="TRY") result = amount / TRY_SYP

document.getElementById("result").innerText =
amount + " " + from + " = " + result.toFixed(2) + " " + to

}

// تبديل العملات
function swap(){
let from = document.getElementById("from")
let to = document.getElementById("to")

let temp = from.value
from.value = to.value
to.value = temp
}

</script>

</body>
</html>
